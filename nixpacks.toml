[phases.setup]
nixPkgs = [
  "php83",
  "composer",
  "nodejs",
  "npm"
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install",
  "npm run build",
  "touch database/database.sqlite",
  "php artisan migrate --force",
  "php artisan storage:link || true"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
